services:
  telegram-bot:
    build: .
    container_name: eltavr-bot
    restart: unless-stopped
    volumes:
      # Монтируем папки для сохранения данных
      - ./user_logs:/app/user_logs
      - ./exports:/app/exports
      - ./broadcast_ids.txt:/app/broadcast_ids.txt
      - ./users.db:/app/users.db
      - ./message.txt:/app/message.txt
      - ./system_prompt.txt:/app/system_prompt.txt
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"